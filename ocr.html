<!DOCTYPE html>
<html>
<head>
    <title>OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <img id="menu" src="assets/images/main_menu.png" style="display:none;" />
    <img id="game" src="assets/images/gamescreen.png" style="display:none;" />
    <div id="output">Starting OCR...<br></div>
    <script>
        async function run() {
            try {
                const out = document.getElementById('output');
                out.innerHTML += "Processing menu...<br>";
                const worker = await Tesseract.createWorker('eng');
                const retMenu = await worker.recognize(document.getElementById('menu'));
                out.innerHTML += "MENU WORDS:<br>";
                retMenu.data.words.forEach(w => {
                    out.innerHTML += `${w.text}: ${w.bbox.x0}, ${w.bbox.y0}, ${w.bbox.x1}, ${w.bbox.y1}<br>`;
                });

                out.innerHTML += "<br>Processing gamescreen...<br>";
                const retGame = await worker.recognize(document.getElementById('game'));
                out.innerHTML += "GAME WORDS:<br>";
                retGame.data.words.forEach(w => {
                    out.innerHTML += `${w.text}: ${w.bbox.x0}, ${w.bbox.y0}, ${w.bbox.x1}, ${w.bbox.y1}<br>`;
                });
                await worker.terminate();
                out.innerHTML += "<br>DONE";
            } catch (e) {
                document.getElementById('output').innerHTML += "<br>ERROR: " + e;
            }
        }
        window.onload = run;
    </script>
</body>
</html>
